// proto/auth.proto
// Internal gRPC contract for Auth Service.
// External clients always use REST — gRPC is service-to-service only.

syntax = "proto3";

package fintrack.auth.v1;

option java_multiple_files = true;
option java_package = "io.fintrack.auth.v1";

// ─── Auth Service ─────────────────────────────────────────────────────────────
service AuthService {
  // Validates an access token and returns the decoded principal.
  // Called by Transaction / Analytics services to verify inbound requests.
  rpc ValidateToken (ValidateTokenRequest) returns (ValidateTokenResponse);

  // Returns public user info by ID (used by other services).
  rpc GetUser (GetUserRequest) returns (GetUserResponse);
}

// ─── Messages ─────────────────────────────────────────────────────────────────
message ValidateTokenRequest {
  string access_token = 1;
}

message ValidateTokenResponse {
  bool   valid      = 1;
  string user_id    = 2;
  string email      = 3;
  string role       = 4;
  string session_id = 5;
  string error      = 6;
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  string id          = 1;
  string email       = 2;
  string first_name  = 3;
  string last_name   = 4;
  string role        = 5;
  bool   is_active   = 6;
}
