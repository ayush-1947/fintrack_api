# .github/workflows/ci.yml
# FinTrack — Continuous Integration & Deployment Pipeline
# Triggers: push to main, any PR

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20.x'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/fintrack-api

jobs:
  # ─── 1. Lint & Type-Check ──────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  # ─── 2. Unit Tests ────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }

      - run: npm ci
      - run: npx prisma generate

      - name: Run unit tests with coverage
        run: npm run test:unit -- --coverage
        env:
          JWT_ACCESS_SECRET:  test_access_secret_that_is_long_enough_xxxx
          JWT_REFRESH_SECRET: test_refresh_secret_that_is_long_enough_xxxx
          DATABASE_URL:       postgresql://test:test@localhost:5432/test
          REDIS_HOST:         localhost
          APP_NAME:           FinTrack
          APP_URL:            http://localhost:3000
          SMTP_FROM:          test@test.com

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # ─── 3. Integration Tests ─────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     fintrack
          POSTGRES_PASSWORD: fintrack_pass
          POSTGRES_DB:       fintrack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://fintrack:fintrack_pass@localhost:5432/fintrack_test

      - name: Run integration tests
        run: npm run test:integration
        env:
          NODE_ENV:             test
          TEST_DATABASE_URL:    postgresql://fintrack:fintrack_pass@localhost:5432/fintrack_test
          DATABASE_URL:         postgresql://fintrack:fintrack_pass@localhost:5432/fintrack_test
          REDIS_HOST:           localhost
          REDIS_PORT:           6379
          JWT_ACCESS_SECRET:    test_access_secret_that_is_long_enough_xxxx
          JWT_REFRESH_SECRET:   test_refresh_secret_that_is_long_enough_xxxx
          APP_NAME:             FinTrack
          APP_URL:              http://localhost:3000
          SMTP_FROM:            test@test.com
          RATE_LIMIT_MAX_REQUESTS: 10000
          AUTH_RATE_LIMIT_MAX:     10000

  # ─── 4. Build Docker Image ────────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context:   .
          push:      true
          tags:      ${{ steps.meta.outputs.tags }}
          labels:    ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ─── 5. Deploy to Staging ─────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key:      ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/fintrack
            docker compose pull api
            docker compose up -d api
            docker compose exec -T api npx prisma migrate deploy
            docker system prune -f
